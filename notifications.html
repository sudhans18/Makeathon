<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MAKEATHON 7.0 — TRANSMISSIONS</title>
  <!-- Main site fonts for navbar -- Anton, Montserrat -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Anton&family=Bangers&family=Montserrat:ital,wght@0,400;0,600;0,800;1,400;1,800&family=Rajdhani:wght@400;600;700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/nav.css" />
  <style>
    :root {
      --red: #E62429;
      --blue: #003DA5;
      --yellow: #FFD700;
      --white: #F5F0E8;
      --ink: #0A0A0F;
      --panel-bg: #F0EBE0;
      --dot-color: rgba(255, 255, 255, 0.15);
      --gwen-pink: #FF3EA5;
    }

    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      overflow-x: hidden;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Rajdhani', sans-serif !important;
      background: #050A1F !important;
      position: relative;
    }

    /* halftone dots */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, var(--dot-color) 1.2px, transparent 1.2px);
      background-size: 18px 18px;
      z-index: 0;
      pointer-events: none;
    }

    /* diagonal blue slab */
    .slab {
      position: fixed;
      top: -10%;
      left: -8%;
      width: 48%;
      height: 130%;
      background: var(--ink);
      transform: skewX(-7deg);
      z-index: 0;
      opacity: 0.12;
      pointer-events: none;
    }

    /* web bg svg */
    .web-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
      opacity: 0.06;
    }

    /* falling strands */
    .web-strand {
      position: fixed;
      top: 0;
      width: 1px;
      background: linear-gradient(180deg, transparent, rgba(230, 36, 41, 0.25), transparent);
      animation: strandFall linear infinite;
      z-index: 0;
      pointer-events: none;
    }

    @keyframes strandFall {
      0% {
        transform: translateY(-100vh);
        opacity: 0;
      }

      10% {
        opacity: 1;
      }

      90% {
        opacity: 1;
      }

      100% {
        transform: translateY(100vh);
        opacity: 0;
      }
    }

    /* ── PAGE WRAP ── */
    .page-wrap {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 7rem 1rem 5rem;
      /* Adjusted for navbar */
    }

    /* ── HEADER ── */
    .header {
      width: 100%;
      max-width: 780px;
      margin-bottom: 2rem;
      position: relative;
    }

    .header-box {
      background: var(--ink);
      border: 4px solid var(--ink);
      padding: 1.6rem 2rem 1.3rem 2.5rem;
      clip-path: polygon(0 0, 100% 0, 100% calc(100% - 20px), calc(100% - 20px) 100%, 0 100%);
      position: relative;
      overflow: hidden;
    }

    .header-box::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(-55deg,
          transparent, transparent 8px,
          rgba(255, 255, 255, 0.03) 8px, rgba(255, 255, 255, 0.03) 16px);
    }

    .header-accent {
      position: absolute;
      top: 0;
      left: 0;
      width: 8px;
      height: 100%;
      background: var(--red);
    }

    .event-eyebrow {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.35em;
      color: var(--red);
      text-transform: uppercase;
      margin-bottom: 0.25rem;
    }

    .header-title {
      font-family: 'Bangers', cursive;
      font-size: clamp(2.8rem, 7vw, 4.8rem);
      color: var(--white);
      letter-spacing: 0.06em;
      line-height: 0.92;
      text-shadow: 5px 5px 0 var(--red), 9px 9px 0 var(--blue);
    }

    .header-title span {
      color: var(--yellow);
      text-shadow: 3px 3px 0 var(--red);
    }

    .header-sub {
      margin-top: 0.5rem;
      font-size: 0.82rem;
      color: rgba(245, 240, 232, 0.5);
      letter-spacing: 0.22em;
      text-transform: uppercase;
      font-weight: 600;
    }

    .spider-corner {
      position: absolute;
      bottom: -8px;
      right: 22px;
      font-size: 2.8rem;
      transform: rotate(-14deg);
      line-height: 1;
      filter: drop-shadow(2px 2px 0 var(--red));
    }

    /* ── SIGNAL BAR ── */
    .signal-bar {
      width: 100%;
      max-width: 780px;
      display: flex;
      align-items: center;
      gap: 0.7rem;
      margin-bottom: 1.8rem;
    }

    .signal-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--red);
      animation: pulse 1.4s ease-in-out infinite;
      flex-shrink: 0;
    }

    .signal-label {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.28em;
      color: var(--red);
      text-transform: uppercase;
      white-space: nowrap;
    }

    .signal-line {
      flex: 1;
      height: 2px;
      background: linear-gradient(90deg, var(--red) 0%, transparent 100%);
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
        transform: scale(1);
      }

      50% {
        opacity: 0.25;
        transform: scale(0.65);
      }
    }

    /* ── CHAT BOX ── */
    #chat-box {
      width: 100%;
      max-width: 780px;
      display: flex;
      flex-direction: column;
      gap: 1.6rem;
    }

    /* ── MESSAGE ── */
    .chat-message {
      display: flex;
      flex-direction: column;
      gap: 0.45rem;
      opacity: 0;
      transform: translateY(32px);
      animation: slideIn 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    @keyframes slideIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .chat-message:nth-child(even) .bubble {
      transform: rotate(0.25deg);
    }

    .chat-message:nth-child(odd) .bubble {
      transform: rotate(-0.25deg);
    }

    .bubble {
      background: var(--white);
      border: 3.5px solid var(--ink);
      padding: 1.25rem 1.5rem 1.1rem;
      position: relative;
      box-shadow: 5px 5px 0 var(--ink);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      cursor: default;
    }

    .bubble:hover {
      transform: translateY(-4px) rotate(0deg) !important;
      box-shadow: 9px 9px 0 var(--ink);
    }

    /* left color stripe per card */
    .chat-message:nth-child(1) .bubble {
      border-left: 7px solid var(--blue);
    }

    .chat-message:nth-child(2) .bubble {
      border-left: 7px solid var(--red);
    }

    .chat-message:nth-child(3) .bubble {
      border-left: 7px solid var(--gwen-pink);
    }

    .chat-message:nth-child(4) .bubble {
      border-left: 7px solid var(--yellow);
    }

    .chat-message:nth-child(5) .bubble {
      border-left: 7px solid var(--blue);
    }

    .chat-message:nth-child(6) .bubble {
      border-left: 7px solid var(--red);
    }

    /* tail */
    .bubble::after {
      content: '';
      position: absolute;
      bottom: -14px;
      left: 24px;
      border-left: 11px solid transparent;
      border-right: 4px solid transparent;
      border-top: 13px solid var(--ink);
    }

    .bubble::before {
      content: '';
      position: absolute;
      bottom: -9px;
      left: 27px;
      border-left: 8px solid transparent;
      border-right: 3px solid transparent;
      border-top: 10px solid var(--white);
      z-index: 1;
    }

    /* ID badge */
    .msg-badge {
      position: absolute;
      top: -15px;
      right: 14px;
      background: var(--ink);
      color: var(--yellow);
      font-family: 'Bangers', cursive;
      font-size: 0.88rem;
      letter-spacing: 0.12em;
      padding: 2px 12px;
      clip-path: polygon(7px 0, 100% 0, calc(100% - 7px) 100%, 0 100%);
    }

    .bubble-text {
      font-size: 1.06rem;
      font-weight: 600;
      color: var(--ink);
      line-height: 1.6;
    }

    .bubble-text strong {
      color: var(--red);
      font-weight: 700;
      background: linear-gradient(90deg, rgba(255, 215, 0, 0.55), rgba(255, 215, 0, 0.1));
      padding: 0 4px;
      border-radius: 2px;
    }

    /* ── META ── */
    .meta {
      display: flex;
      align-items: center;
      gap: 0.55rem;
      padding-left: 1rem;
      margin-top: 0.3rem;
    }

    .sender-chip {
      font-family: 'Bangers', cursive;
      font-size: 0.82rem;
      letter-spacing: 0.14em;
      color: var(--white);
      background: var(--ink);
      border: 2px solid var(--red);
      padding: 1px 10px 0;
      border-radius: 3px;
    }

    .meta-sep {
      color: rgba(10, 10, 15, 0.3);
      font-size: 0.65rem;
    }

    .time-text {
      font-size: 0.74rem;
      font-weight: 600;
      color: rgba(10, 10, 15, 0.45);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    /* ── NO MESSAGES ── */
    .no-messages {
      font-family: 'Bangers', cursive;
      font-size: 2rem;
      letter-spacing: 0.3em;
      color: rgba(10, 10, 15, 0.18);
      text-align: center;
      padding: 5rem 0;
    }

    /* ── FOOTER ── */
    .footer {
      margin-top: 3.5rem;
      width: 100%;
      max-width: 780px;
      display: flex;
      align-items: center;
      gap: 1rem;
      opacity: 0.3;
    }

    .footer-line {
      flex: 1;
      height: 2px;
      background: var(--ink);
    }

    .footer-txt {
      font-family: 'Bangers', cursive;
      font-size: 0.88rem;
      letter-spacing: 0.25em;
      color: var(--ink);
      white-space: nowrap;
    }
  </style>
</head>

      <div class="signal-dot"></div>
      <div class="signal-label">Live Channel Active</div>

    </div>

    <div id="chat-box"></div>

    <a href="index.html"
      style="margin-top: 2rem; padding: 0.8rem 2rem; font-family: 'Bangers', cursive; font-size: 1.5rem; letter-spacing: 0.1em; color: var(--ink); background: var(--yellow); text-decoration: none; border: 3px solid var(--ink); box-shadow: 4px 4px 0 var(--ink); transition: transform 0.2s, box-shadow 0.2s; display: inline-block;"
      onmouseover="this.style.transform='translateY(-3px)'; this.style.boxShadow='7px 7px 0 var(--ink)';"
      onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='4px 4px 0 var(--ink)';">RETURN TO MAIN
      PAGE</a>

  </div>

  <script>
    // Falling web strands
    for (let i = 0; i < 7; i++) {
      const s = document.createElement('div');
      s.className = 'web-strand';
      s.style.left = (5 + i * 14) + '%';
      s.style.height = (35 + Math.random() * 45) + 'vh';
      s.style.animationDuration = (9 + Math.random() * 13) + 's';
      s.style.animationDelay = (Math.random() * 12) + 's';
      document.body.appendChild(s);
    }

    document.addEventListener('DOMContentLoaded', () => {
      const chatBox = document.getElementById('chat-box');

      const baseMessages = [
        "Welcome to Make-A-Thon 7.0! We are thrilled to have you here. Get ready to build beyond limits.",
        "Due to institutional commitments related to upcoming election processes and venue requirements, the event has been postponed and will now be tentatively held in the last week of April 2026.",
        "**Registrations are still open**. Missed registering earlier? You still have your chance to be part of the innovation sprint.",
        "New registration deadline for Hardware, Software and Industry Problem Statements: **April 17th, 2026**.",
        "<img src='assets/notificationposter.jpeg' alt='Notification Poster' style='max-width: 350px; width: 100%; height: auto; border: 3px solid var(--ink); border-radius: 6px; display: block; margin-top: 0.2rem; box-shadow: 2px 2px 0 rgba(0,0,0,0.1);'/>"
      ];

      const notificationsData = [];
      const startDate = new Date('2026-04-06T10:00:00+05:30'); // Every morning at 10 AM

      // Load messages up to the length of baseMessages
      for (let i = 0; i < baseMessages.length; i++) {
        let d = new Date(startDate.getTime());
        d.setDate(startDate.getDate() + i);
        notificationsData.push({
          id: i + 1,
          releaseDate: d.getTime(),
          content: baseMessages[i]
        });
      }

      const now = new Date().getTime();
      const visibleMessages = notificationsData.filter(msg => now >= msg.releaseDate);

      if (visibleMessages.length === 0) {
        chatBox.innerHTML = '<div class="no-messages">— NO TRANSMISSIONS YET —</div>';
        return;
      }

      function parseContent(text) {
        return text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
      }

      function formatDate(ts) {
        return new Date(ts).toLocaleDateString('en-US', {
          month: 'short', day: 'numeric',
          hour: '2-digit', minute: '2-digit'
        });
      }

      visibleMessages.forEach((msg, i) => {
        const el = document.createElement('div');
        el.className = 'chat-message';
        el.style.animationDelay = `${i * 0.18}s`;
        el.innerHTML = `
          <div class="bubble">
            <div class="msg-badge">MSG #${String(msg.id).padStart(2, '0')}</div>
            <div class="bubble-text">${parseContent(msg.content)}</div>
            <div style="font-size: 0.75rem; color: rgba(10,10,15,0.5); font-weight: 700; text-align: right; margin-top: 0.5rem; letter-spacing: 0.05em;">
              ${formatDate(msg.releaseDate)}
            </div>
          </div>
        `;
        chatBox.appendChild(el);
      });

      setTimeout(() => { chatBox.scrollTop = chatBox.scrollHeight; }, 100);
    });
  </script>
  <script src="js/core/hamburger.js"></script>
